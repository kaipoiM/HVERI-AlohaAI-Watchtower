# Nginx config for AlohaAI Emergency Watchtower
# Place at: /etc/nginx/sites-available/watchtower
# Then: sudo ln -s /etc/nginx/sites-available/watchtower /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name yourdomain.com www.yourdomain.com;

    # Redirect HTTP → HTTPS (after you've run certbot)
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name yourdomain.com www.yourdomain.com;

    # SSL — managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/yourdomain.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/yourdomain.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Increase timeouts for long-running SSE streams
    proxy_read_timeout    300s;
    proxy_connect_timeout 75s;
    proxy_send_timeout    300s;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;

        # Required for SSE
        proxy_set_header   Connection '';
        chunked_transfer_encoding on;
        proxy_buffering    off;
        proxy_cache        off;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
