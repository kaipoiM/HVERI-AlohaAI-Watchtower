<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AlohaAI Watchtower — Set New Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .container { max-width: 420px; margin-top: 80px; }

        .card {
            background: var(--bg-panel);
            border: 1px solid var(--border);
            border-radius: 3px;
            overflow: hidden;
        }

        .card-header {
            background: var(--bg-elevated);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--red);
            text-transform: uppercase;
        }

        .card-body {
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .notice {
            background: var(--red-dim);
            border: 1px solid var(--red-dark);
            border-left: 3px solid var(--red);
            border-radius: 3px;
            padding: 10px 14px;
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--text-dim);
            line-height: 1.6;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .field-group label {
            font-family: var(--font-mono);
            font-size: 11px;
            letter-spacing: 0.1em;
            color: var(--text-dim);
            text-transform: uppercase;
        }

        .field-group input {
            width: 100%;
            padding: 11px 14px;
            font-family: var(--font-mono);
            font-size: 13px;
            background: var(--bg-elevated);
            border: 1px solid var(--border-bright);
            border-radius: 3px;
            color: var(--text);
            outline: none;
            box-sizing: border-box;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field-group input:focus {
            border-color: var(--red);
            box-shadow: 0 0 0 3px rgba(214, 21, 21, 0.1);
        }

        .error-msg {
            font-family: var(--font-mono);
            font-size: 12px;
            color: var(--red);
            display: none;
        }
        .error-msg.visible { display: block; }

        .submit-btn {
            width: 100%;
            padding: 11px;
            background: var(--red);
            color: #fff;
            border: none;
            border-radius: 3px;
            font-family: var(--font-ui);
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .submit-btn:hover { opacity: 0.88; }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .hint {
            font-family: var(--font-mono);
            font-size: 11px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>
                <span class="title-aloha">Aloha</span><span class="title-ai">AI</span>
                <span class="title-sub">Emergency Watchtower</span>
            </h1>
        </header>

        <div class="card">
            <div class="card-header">⬡ Set New Password</div>
            <div class="card-body">
                <div class="notice">
                    You are using a temporary password. Please set a new password before continuing.
                </div>

                <div class="field-group">
                    <label>Current (Temporary) Password</label>
                    <input type="password" id="current" placeholder="••••••••••" autocomplete="current-password">
                </div>
                <div class="field-group">
                    <label>New Password</label>
                    <input type="password" id="new-pass" placeholder="••••••••••" autocomplete="new-password">
                    <span class="hint">Minimum 10 characters</span>
                </div>
                <div class="field-group">
                    <label>Confirm New Password</label>
                    <input type="password" id="confirm" placeholder="••••••••••" autocomplete="new-password">
                </div>

                <div class="error-msg" id="error-msg"></div>
                <button class="submit-btn" id="submit-btn">Set Password &amp; Continue</button>
            </div>
        </div>
    </div>

    <script>
        // Theme
        const saved = localStorage.getItem('theme');
        const dark  = window.matchMedia('(prefers-color-scheme: dark)').matches;
        if (saved === 'dark' || (!saved && dark)) {
            document.documentElement.setAttribute('data-theme', 'dark');
        }

        const submitBtn = document.getElementById('submit-btn');
        const errorMsg  = document.getElementById('error-msg');

        async function doChange() {
            const current  = document.getElementById('current').value;
            const newPass  = document.getElementById('new-pass').value;
            const confirm  = document.getElementById('confirm').value;

            errorMsg.classList.remove('visible');

            if (!current || !newPass || !confirm) {
                errorMsg.textContent = 'All fields are required.';
                errorMsg.classList.add('visible');
                return;
            }
            if (newPass.length < 10) {
                errorMsg.textContent = 'New password must be at least 10 characters.';
                errorMsg.classList.add('visible');
                return;
            }
            if (newPass !== confirm) {
                errorMsg.textContent = 'New passwords do not match.';
                errorMsg.classList.add('visible');
                return;
            }

            submitBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        current_password: current,
                        new_password:     newPass,
                        confirm_password: confirm,
                    }),
                });

                if (!res.ok) {
                    const data = await res.json();
                    errorMsg.textContent = data.detail || 'Failed to change password.';
                    errorMsg.classList.add('visible');
                    submitBtn.disabled = false;
                    return;
                }

                window.location.href = '/admin';
            } catch {
                errorMsg.textContent = 'Connection error. Please try again.';
                errorMsg.classList.add('visible');
                submitBtn.disabled = false;
            }
        }

        submitBtn.addEventListener('click', doChange);
        document.addEventListener('keydown', e => { if (e.key === 'Enter') doChange(); });
    </script>
</body>
</html>
